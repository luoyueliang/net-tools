proxy-groups:
  # 自动选择延迟最低节点（对应 xray leastPing balancer）
  - name: "🚀 自动选择"
    type: url-test
    proxies:
      - proxy-home-reality
      - proxy-direct-sg
      - proxy-liuren-sg
      - proxy-sg-tempco
      - proxy-sg-r630
      - proxy-kl01
      - proxy-19800820
    url: "https://www.gstatic.com/generate_204"
    interval: 120
    tolerance: 50

  # 手动选择（包含所有节点）
  - name: "⚡ 手动选择"
    type: select
    proxies:
      - 🚀 自动选择
      - proxy-home-reality
      - proxy-direct-sg
      - proxy-gnb
      - proxy-liuren-sg
      - proxy-sg-tempco
      - proxy-sg-r630
      - proxy-kl01
      - proxy-19800820
      - DIRECT

  # 兜底策略
  - name: "🌐 默认出口"
    type: select
    proxies:
      - 🚀 自动选择
      - ⚡ 手动选择
      - DIRECT

