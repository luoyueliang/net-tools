# Clash Meta (Mihomo) / ClashX Pro 配置
# 由 192.168.0.3 xray config.json 转换
# 注意：proxy-direct (VLESS+Reality) 需要 Clash Meta / ClashX Pro，普通 ClashX 不支持
#
# 导入方式：ClashX Pro → 配置 → 托管配置 → 添加 → 选择此文件

mixed-port: 7890        # HTTP/SOCKS5 混合端口
allow-lan: false
mode: rule
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090
external-ui: ui

# DNS 配置 - 本地接管，防污染
# 监听 127.0.0.1:1053，配合 pf 规则接管系统 DNS
# 使用: mihomo-ctl dns-on   开启 DNS 接管
#       mihomo-ctl dns-off  恢复系统 DNS
dns:
  enable: true
  ipv6: false
  listen: 127.0.0.1:1053
  enhanced-mode: redir-host   # 返回真实 IP，兼容性好
  default-nameserver:         # 用于引导解析 DoH 服务器域名
    - 223.5.5.5
    - 114.114.114.114
  nameserver:                 # 国内域名用国内 DoH（干净、快）
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:                   # 国外域名用国际 DoH（走代理，防污染）
    - tls://1.1.1.1:853
    - https://dns.google/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:                   # 被污染的 IP 段触发 fallback
      - 240.0.0.0/4
      - 0.0.0.0/8

# TUN 透明代理（可选，接管所有 TCP/UDP 流量，适用于不走系统代理的应用，如 Telegram Desktop）
# 开启: mihomo-ctl tun-on   关闭: mihomo-ctl tun-off   需要以 sudo/root 运行 Mihomo
tun:
  enable: true          # mihomo-ctl tun-on 将此改为 true
  stack: system          # system 栈，macOS/Linux 均支持，无需 gvisor 驱动
  auto-route: true       # 自动配置路由表（需要 root 权限）
  auto-detect-interface: true
  dns-hijack:
    - any:53

