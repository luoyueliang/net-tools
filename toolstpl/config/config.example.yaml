# __TOOL_NAME__ 配置模板
# 复制此文件至运行时配置路径: ~/.config/__TOOL_NAME__/config.yaml
# 敏感信息请在本地副本中填写；此模板永远只保留占位符。

# ── 服务监听 ──────────────────────────────────────────────────
bind: 127.0.0.1
port: __API_PORT__

# ── 日志级别 ──────────────────────────────────────────────────
# 可选: debug | info | warning | error | silent
log-level: info

# ── 示例配置项（按实际工具需求增删）──────────────────────────
# option-a: __OPTION_A__
# option-b: __OPTION_B__
