name: Release mihomo-ctl

# 触发：推送 mihomo-ctl-vX.Y.Z 格式 tag
on:
  push:
    tags:
      - 'mihomo-ctl-v*'

jobs:
  # ── Step 1: 创建 GitHub Release（一次性，先于多平台构建）
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          VER="${TAG#mihomo-ctl-v}"
          echo "tag=${TAG}"     >> "$GITHUB_OUTPUT"
          echo "version=${VER}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VER="${{ steps.tag.outputs.version }}"
          BASE="https://github.com/luoyueliang/net-tools/releases/download/${TAG}"
          printf '## mihomo-ctl v%s\n\n'            "${VER}"             > /tmp/notes.md
          printf '### 安装（推荐）\n\n'                                  >> /tmp/notes.md
          printf '```bash\n'                                             >> /tmp/notes.md
          printf '# 1. 下载安装包\n'                                     >> /tmp/notes.md
          printf 'curl -LO %s/mihomo-ctl-installer-%s.tar.gz\n' "${BASE}" "${VER}" >> /tmp/notes.md
          printf '# 2. 解压\n'                                           >> /tmp/notes.md
          printf 'tar xzf mihomo-ctl-installer-%s.tar.gz\n' "${VER}"   >> /tmp/notes.md
          printf 'cd mihomo-ctl-installer-%s\n' "${VER}"                >> /tmp/notes.md
          printf '# 3. 安装（自动检测平台）\n'                            >> /tmp/notes.md
          printf 'node scripts/install.js\n'                             >> /tmp/notes.md
          printf '```\n\n'                                               >> /tmp/notes.md
          printf '### 自升级（已安装用户）\n\n'                           >> /tmp/notes.md
          printf '```bash\nmihomo-ctl upgrade\n```\n\n'                  >> /tmp/notes.md
          printf '> 需已安装 Node.js v16+\n'                             >> /tmp/notes.md
          gh release create "${TAG}" \
            --title "mihomo-ctl v${VER}" \
            --notes-file /tmp/notes.md \
            --repo luoyueliang/net-tools || \
            echo "Release already exists, will upload assets to existing release"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build installer package
        working-directory: mihomo
        run: |
          npm install
          node scripts/release.js

      - name: Upload installer to Release
        working-directory: mihomo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VER="${{ steps.tag.outputs.version }}"
          gh release upload "${TAG}" \
            "dist/mihomo-ctl-installer-${VER}.tar.gz" \
            --clobber \
            --repo luoyueliang/net-tools

  # ── Step 2: 多平台构建并上传资产
  build-upload:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: macos-latest
            platform: darwin
            arch: x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: mihomo
        run: npm install

      - name: Build obfuscated release
        working-directory: mihomo
        env:
          TARGET_PLAT: ${{ matrix.platform }}
          TARGET_ARCH: ${{ matrix.arch }}
        run: node scripts/release.js

      - name: Verify asset exists
        working-directory: mihomo
        run: |
          VER="${{ needs.create-release.outputs.version }}"
          ASSET="dist/mihomo-ctl-${VER}-${{ matrix.platform }}-${{ matrix.arch }}.gz"
          if [ ! -f "${ASSET}" ]; then
            echo "ERROR: Expected asset not found: ${ASSET}"
            ls -la dist/
            exit 1
          fi
          echo "Asset ready: ${ASSET} ($(du -sh "${ASSET}" | cut -f1))"

      - name: Upload asset to Release
        working-directory: mihomo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.create-release.outputs.tag }}"
          VER="${{ needs.create-release.outputs.version }}"
          gh release upload "${TAG}" \
            "dist/mihomo-ctl-${VER}-${{ matrix.platform }}-${{ matrix.arch }}.gz" \
            --clobber \
            --repo luoyueliang/net-tools
